<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Analytics Dashboard</title>
    <style>
        /* CSS RESET & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #151b2c;
            --bg-card: #1e2640;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --border-color: #2e3a5f;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .dashboard-layout {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* HEADER SECTION */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .date-badge {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* METRICS CARDS */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .card.balance::before { background: var(--accent-blue); }
        .card.spending::before { background: var(--accent-green); }

        .card h3 {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .card .amount {
            font-size: 32px;
            font-weight: 700;
        }

        /* MAIN APP DATA WORKSPACE */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }

        @media (max-width: 850px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* FORMS SECTION */
        .interactive-form h2 {
            font-size: 18px;
            margin-bottom: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-blue);
        }

        .submit-btn {
            width: 100%;
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #2563eb;
        }

        /* TRANSACTIONS LEDGER */
        .ledger-container h2 {
            font-size: 18px;
            margin-bottom: 18px;
        }

        .table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: var(--bg-card);
            padding: 14px 18px;
            color: var(--text-muted);
            font-weight: 600;
        }

        td {
            padding: 14px 18px;
            border-top: 1px solid var(--border-color);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-income { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .badge-expense { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    </style>
</head>
<body>

    <div class="dashboard-layout">
        <header>
            <h1>FintechCore Engine</h1>
            <div class="date-badge" id="currentDate">Live Environment</div>
        </header>

        <section class="metrics-grid">
            <div class="card balance">
                <h3>Total Liquidity</h3>
                <div class="amount" id="totalBalance">$5,400.00</div>
            </div>
            <div class="card spending">
                <h3>Tracked Expenses</h3>
                <div class="amount" id="totalExpenses">$1,250.00</div>
            </div>
        </section>

        <main class="content-grid">
            <section class="card interactive-form">
                <h2>Log Asset Event</h2>
                <div class="form-group">
                    <label for="desc">Description/Merchant</label>
                    <input type="text" id="desc" placeholder="e.g., Cloud Server Payment">
                </div>
                <div class="form-group">
                    <label for="amount">Fiat Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label for="type">Flow Direction</label>
                    <select id="type">
                        <option value="income">Income (+)</option>
                        <option value="expense">Expense (-)</option>
                    </select>
                </div>
                <button class="submit-btn" id="executeBtn">Execute Entry</button>
            </section>

            <section class="ledger-container">
                <h2>Real-Time Activity Logs</h2>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Description</th>
                                <th>Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
